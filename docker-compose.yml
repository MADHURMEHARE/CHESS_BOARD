version: '3.9'

services:

  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/chessdb

    depends_on:
      - db

  db:
    image: postgres:16-alpine

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chessdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: